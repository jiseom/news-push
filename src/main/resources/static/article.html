<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>기사 본문</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f5f5f5; font-family: 'Noto Sans KR', sans-serif; }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
    }
    .btn-back { background: none; border: none; font-size: 0.9rem; color: #222; cursor: pointer; padding: 0; }
    .btn-back:hover { text-decoration: underline; }
    .title-bar { flex: 1; font-size: 0.88rem; color: #333; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .btn-open {
      background: #222; color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 0.82rem; cursor: pointer; flex-shrink: 0;
    }
    .btn-open:hover { background: #444; }
    .content { max-width: 720px; margin: 32px auto; background: #fff; border-radius: 10px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .article-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; line-height: 1.5; }
    .article-meta { font-size: 0.82rem; color: #aaa; margin-bottom: 24px; }
    .article-link a { color: #222; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="btn-back" onclick="history.back()">← 목록</button>
    <div class="title-bar" id="titleBar"></div>
    <button class="btn-open" onclick="openLink()">원문 보기</button>
  </div>
  <div class="content">
    <div class="article-title" id="articleTitle"></div>
    <div class="article-meta" id="articleMeta"></div>
    <div class="article-link"><a id="articleLink" href="#" target="_blank">→ 연합뉴스에서 전체 기사 보기</a></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const articleId = params.get('articleId');
    const link = decodeURIComponent(params.get('link') || '');
    const title = decodeURIComponent(params.get('title') || '');
    const userId = sessionStorage.getItem('userId');

    if (!userId) location.href = '/index.html';

    document.getElementById('titleBar').textContent = title;
    document.getElementById('articleTitle').textContent = title;
    document.getElementById('articleLink').href = link;

    function openLink() { window.open(link, '_blank'); }

    // 읽음 처리
    if (articleId && userId) {
      fetch(`/api/articles/${encodeURIComponent(articleId)}/read?userId=${userId}`, { method: 'POST' });
    }
  </script>
</body>
</html>
