<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>뉴스 피드</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border-radius: 10px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h5 { font-weight: 700; margin-bottom: 24px; }
    .btn-start { background: #222; color: #fff; border: none; border-radius: 6px; padding: 11px; width: 100%; margin-top: 14px; font-size: 0.95rem; }
    .btn-start:hover { background: #444; }
    .btn-start:disabled { background: #ccc; }
  </style>
</head>
<body>
  <div class="box">
    <h5>사용자 선택</h5>
    <select class="form-select" id="userSelect">
      <option value="">-- 선택하세요 --</option>
    </select>
    <button class="btn-start" id="startBtn" disabled onclick="start()">시작</button>
  </div>
  <script>
    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();
      const sel = document.getElementById('userSelect');
      users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = u.name;
        sel.appendChild(opt);
      });
    }
    document.getElementById('userSelect').addEventListener('change', function() {
      document.getElementById('startBtn').disabled = !this.value;
    });
    function start() {
      const sel = document.getElementById('userSelect');
      sessionStorage.setItem('userId', sel.value);
      sessionStorage.setItem('userName', sel.options[sel.selectedIndex].text);
      location.href = '/list.html';
    }
    loadUsers();
  </script>
</body>
</html>
