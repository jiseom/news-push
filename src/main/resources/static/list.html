<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>기사 목록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f5f5; font-family: 'Noto Sans KR', sans-serif; }
    .layout { display: flex; height: 100vh; }

    .sidebar {
      width: 160px;
      background: #222;
      color: #fff;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 24px 0;
    }
    .sidebar .user-name {
      font-size: 0.8rem;
      color: #aaa;
      padding: 0 16px 16px;
      border-bottom: 1px solid #333;
      margin-bottom: 12px;
    }
    .cat-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #ccc;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .cat-item:hover { color: #fff; background: #333; }
    .cat-item.active { color: #fff; border-left-color: #fff; background: #333; font-weight: 600; }

    .main { flex: 1; overflow-y: auto; padding: 24px; }

    .article-item {
      background: #fff;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid #eee;
      transition: border-color 0.15s;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .article-item:hover { border-color: #222; color: inherit; }
    .article-item.read { opacity: 0.45; }

    .article-title { font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; }
    .article-item.read .article-title { color: #999; }
    .article-meta { font-size: 0.78rem; color: #aaa; display: flex; gap: 10px; align-items: center; }
    .read-tag { font-size: 0.72rem; background: #eee; color: #999; padding: 1px 7px; border-radius: 10px; }

    .empty { text-align: center; color: #bbb; padding: 60px 0; }
    .spinner-wrap { text-align: center; padding: 60px 0; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="user-name" id="userName"></div>
      <div id="categoryList"></div>
    </div>
    <div class="main" id="articleList">
      <div class="spinner-wrap"><div class="spinner-border" role="status"></div></div>
    </div>
  </div>


  <script>
      window.addEventListener('pageshow', function(e) {
      if (e.persisted) location.reload();
     });


      const userId = sessionStorage.getItem('userId');
      if (!userId) location.href = '/index.html';

      document.getElementById('userName').textContent = sessionStorage.getItem('userName');

      async function loadCategories() {
        const res = await fetch('/api/categories');
        const cats = await res.json();
        const list = document.getElementById('categoryList');
        cats.forEach((cat, i) => {
          const div = document.createElement('div');
          div.className = 'cat-item' + (i === 0 ? ' active' : '');
          div.textContent = cat;
          div.onclick = () => selectCategory(cat, div);
          list.appendChild(div);
        });
        if (cats.length > 0) loadArticles(cats[0]);
      }

      function selectCategory(cat, el) {
        document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        loadArticles(cat);
      }

      async function loadArticles(category) {
        const main = document.getElementById('articleList');
        main.innerHTML = '<div class="spinner-wrap"><div class="spinner-border" role="status"></div></div>';
        const res = await fetch(`/api/articles?category=${category}&userId=${userId}`);
        const articles = await res.json();
        if (!articles.length) { main.innerHTML = '<div class="empty">기사가 없습니다.</div>'; return; }
        main.innerHTML = articles.map(a => `
          <div class="article-item ${a.read ? 'read' : ''}" onclick="goArticle('${a.articleId}', '${encodeURIComponent(a.link)}', '${encodeURIComponent(a.title)}', this)">
            <div class="article-title">${a.title}</div>
            <div class="article-meta">
              <span>${a.author || '-'}</span>
              <span>${fmt(a.pubDate)}</span>
              ${a.read ? '<span class="read-tag">읽음</span>' : ''}
            </div>
          </div>
        `).join('');
      }

      async function goArticle(articleId, link, title, el) {
        // 읽음 처리 완료 후 이동
        await fetch(`/api/articles/${encodeURIComponent(articleId)}/read?userId=${userId}`, { method: 'POST' });
        location.href = `/article.html?articleId=${encodeURIComponent(articleId)}&link=${link}&title=${title}`;
      }

      function fmt(d) {
        if (!d) return '';
        const dt = new Date(d);
        return `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
      }

      loadCategories();
  </script>
</body>
</html>
